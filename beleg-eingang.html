<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⛽ Beleg einreichen</title>
<style>
  :root {
    --blue: #1a56a0;
    --blue-light: #e8f0fb;
    --green: #2d8c4e;
    --green-light: #e8f5ed;
    --orange: #f59e0b;
    --orange-light: #fef3c7;
    --gray: #f4f5f7;
    --border: #dde1e8;
    --text: #1e2330;
    --muted: #6b7280;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #eef1f6; color: var(--text); min-height: 100vh; }
  header { background: var(--blue); color: white; padding: 18px 24px; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 12px; flex: 1 1 160px; }
  .header-right { display: flex; align-items: center; flex: 1 1 160px; justify-content: flex-end; }
  header span.icon { font-size: 1.6rem; }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  .header-logo { height: 40px; width: auto; display: block; }
  main { max-width: 560px; margin: 0 auto; padding: 24px 20px; }
  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; margin-bottom: 18px; }
  .card h2 { font-size: 1rem; margin-bottom: 6px; }
  .card p.hint { font-size: 0.85rem; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
  .field-group label { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
  .field-group input, .field-group textarea, .field-group select {
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 0.92rem; font-family: inherit; width: 100%;
  }
  .field-group input:focus, .field-group textarea:focus, .field-group select:focus { outline: none; border-color: var(--blue); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn { border: none; border-radius: 8px; padding: 12px 20px; font-size: 0.95rem; font-weight: 700; cursor: pointer; width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-blue { background: var(--blue); color: white; }
  .btn-green { background: var(--green); color: white; }
  .btn-gray { background: var(--border); color: var(--text); }
  .file-row { display: flex; align-items: center; gap: 10px; }
  .file-row label.file-label {
    display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 600; color: var(--blue);
    cursor: pointer; border: 1px dashed var(--blue); border-radius: 8px; padding: 9px 14px;
  }
  .file-row .file-name { font-size: 0.82rem; color: var(--muted); flex: 1; word-break: break-all; }
  .file-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .file-list-item {
    display: flex; align-items: center; gap: 8px; background: var(--gray); border-radius: 8px; padding: 7px 10px; font-size: 0.82rem;
  }
  .file-list-item .fname { flex: 1; word-break: break-all; }
  .file-list-item button { border: none; background: none; color: var(--muted); font-size: 0.95rem; cursor: pointer; line-height: 1; padding: 0 2px; }
  .file-list-item button:hover { color: #c0392b; }
  .toast {
    position: fixed; bottom: 24px; right: 24px; left: 24px; background: var(--text); color: white; padding: 14px 18px;
    border-radius: 10px; font-size: 0.9rem; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 999; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .success-box { display: none; text-align: center; padding: 20px 0; }
  .success-box .big { font-size: 2.4rem; margin-bottom: 8px; }
  .success-box h2 { margin-bottom: 6px; }
  .success-box p { color: var(--muted); font-size: 0.88rem; margin-bottom: 18px; }
  .back-to-dashboard {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: white;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 8px 16px;
    border-radius: 999px;
    white-space: nowrap;
    flex: 0 0 auto;
    transition: background 0.15s ease;
  }
  .back-to-dashboard:hover { background: rgba(255, 255, 255, 0.28); text-decoration: none; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <span class="icon">⛽</span>
    <h1>Beleg einreichen — 1. SC 1911 Heiligenstadt</h1>
  </div>
  <a href="https://tecko1985.github.io/ToolsUebersicht/" class="back-to-dashboard">← Zurück zum Dashboard</a>
  <div class="header-right">
    <img class="header-logo" src="logo.png" alt="1. SC 1911 e.V. Heilbad Heiligenstadt" />
  </div>
</header>

<main>
  <div class="card" id="formCard">
    <h2>📝 Beleg-Angaben</h2>
    <div class="field-group">
      <label>Zugriffscode</label>
      <input type="text" id="subCode" placeholder="vom Verein erhalten" autocomplete="off" />
    </div>
    <div class="field-group">
      <label>Dein Name</label>
      <input type="text" id="subName" placeholder="z. B. Michel" />
    </div>
    <div class="row2">
      <div class="field-group">
        <label>Betrag (€)</label>
        <input type="number" id="subAmount" placeholder="0,00" min="0" step="0.01" />
      </div>
      <div class="field-group">
        <label>Datum</label>
        <input type="date" id="subDate" />
      </div>
    </div>
    <div class="field-group">
      <label>Beschreibung</label>
      <input type="text" id="subDesc" placeholder="z. B. Tanken Vereinsbus" />
    </div>
    <div class="field-group">
      <label>Beleg-Fotos / PDFs</label>
      <div class="file-row">
        <label class="file-label" for="subFile">📎 Dateien wählen</label>
        <input type="file" id="subFile" accept="image/*,.pdf" multiple style="display:none" onchange="handleFileSelect(event)" />
        <span class="file-name" id="subFileName">Keine Datei ausgewählt</span>
      </div>
      <div class="file-list" id="subFileList"></div>
    </div>
    <div class="field-group">
      <label>Notiz (optional)</label>
      <textarea id="subNote" rows="2" placeholder="Zusätzliche Infos für den Kassierer"></textarea>
    </div>
    <button class="btn btn-green" id="submitBtn" onclick="submitReceipt()">✅ Beleg einreichen</button>
  </div>

  <div class="card success-box" id="successBox">
    <div class="big">✅</div>
    <h2>Beleg eingereicht!</h2>
    <p>Danke! Der Beleg wurde übermittelt und wird vom Kassierer übernommen.</p>
    <button class="btn btn-blue" onclick="resetForm()">➕ Weiteren Beleg einreichen</button>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  // Cloudflare-Worker-Proxy nimmt den Upload entgegen und leitet ihn
  // server-seitig per WebDAV an Nextcloud weiter (umgeht das CORS-Problem
  // direkter Browser-Uploads zum Storage Share). Siehe worker.js im Repo.
  const WORKER_URL = 'https://sc-heiligenstadt-beleg-upload.michel-brunner.workers.dev/';

  // Lokales Datum als YYYY-MM-DD (nicht toISOString: das UTC-Datum springt in
  // der deutschen Zeitzone nach Mitternacht auf den Vortag).
  function localDateIso() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  let pendingFiles = [];

  function handleFileSelect(e) {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    pendingFiles.push(...files);
    e.target.value = '';
    renderFileList();
  }

  function removePendingFile(idx) {
    pendingFiles.splice(idx, 1);
    renderFileList();
  }

  function renderFileList() {
    const listEl = document.getElementById('subFileList');
    document.getElementById('subFileName').textContent = pendingFiles.length ? `${pendingFiles.length} Datei(en) ausgewählt` : 'Keine Datei ausgewählt';
    listEl.innerHTML = pendingFiles.map((f, i) => `
      <div class="file-list-item">
        <span class="fname">📄 ${escapeHtml(f.name)}</span>
        <button type="button" onclick="removePendingFile(${i})" title="Entfernen">✕</button>
      </div>
    `).join('');
  }

  async function submitReceipt() {
    const code = document.getElementById('subCode').value.trim();
    const name = document.getElementById('subName').value.trim();
    const amount = document.getElementById('subAmount').value;
    const date = document.getElementById('subDate').value || localDateIso();
    const desc = document.getElementById('subDesc').value.trim();
    const note = document.getElementById('subNote').value.trim();
    if (!code) return toast('Bitte den Zugriffscode eingeben.');
    if (!name) return toast('Bitte deinen Namen eingeben.');
    if (!desc) return toast('Bitte eine Beschreibung eingeben.');
    if (!pendingFiles.length) return toast('Bitte mindestens einen Beleg (Foto/PDF) auswählen.');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Wird gesendet…';
    try {
      const form = new FormData();
      form.append('code', code);
      form.append('name', name);
      form.append('amount', amount);
      form.append('date', date);
      form.append('desc', desc);
      form.append('note', note);
      pendingFiles.forEach(f => form.append('files', f));

      const res = await fetch(WORKER_URL, { method: 'POST', body: form });
      const result = await res.json().catch(() => ({}));
      if (!res.ok || !result.ok) throw new Error(result.error || `Server-Fehler (${res.status})`);

      document.getElementById('formCard').style.display = 'none';
      document.getElementById('successBox').style.display = 'block';
    } catch (e) {
      toast('❌ Einreichen fehlgeschlagen: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '✅ Beleg einreichen';
    }
  }

  function resetForm() {
    document.getElementById('subAmount').value = '';
    document.getElementById('subDesc').value = '';
    document.getElementById('subNote').value = '';
    document.getElementById('subDate').value = localDateIso();
    pendingFiles = [];
    document.getElementById('subFile').value = '';
    renderFileList();
    document.getElementById('formCard').style.display = 'block';
    document.getElementById('successBox').style.display = 'none';
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  document.getElementById('subDate').value = localDateIso();
  document.getElementById('subName').value = localStorage.getItem('eingang_username') || '';
  document.getElementById('subName').addEventListener('input', e => localStorage.setItem('eingang_username', e.target.value.trim()));
  document.getElementById('subCode').value = localStorage.getItem('eingang_code') || '';
  document.getElementById('subCode').addEventListener('input', e => localStorage.setItem('eingang_code', e.target.value.trim()));
</script>
</body>
</html>
